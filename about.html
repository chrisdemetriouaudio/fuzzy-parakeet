<script>
(function() {
  const phrases = document.querySelectorAll('.tagline-phrase');
  if (!phrases.length) return;
  phrases.forEach(phrase => {
    const chars = [...phrase.textContent.trim().toUpperCase()];
    phrase.innerHTML = chars.map(c =>
      c === ' ' ? '<span class="tg-sp"></span>' : `<span>${c}</span>`
    ).join('');
  });
  let current = 0;
  setInterval(() => {
    phrases[current].classList.remove('active');
    current = (current + 1) % phrases.length;
    phrases[current].classList.add('active');
  }, 3200);
})();
</script>
