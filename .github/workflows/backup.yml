name: Backup to Private Repo

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Push to backup repo
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.BACKUP_TOKEN }}
        with:
          source-directory: '.'
          destination-github-username: 'chrisdemetriouaudio'
          destination-repository-name: 'fuzzy-parakeet-backup'
          target-branch: main
